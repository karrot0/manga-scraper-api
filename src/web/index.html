<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manga Scraper API</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#f5f3ff',
              100: '#ede9fe',
              200: '#ddd6fe',
              300: '#c4b5fd',
              400: '#a78bfa',
              500: '#8b5cf6',
              600: '#7c3aed',
              700: '#6d28d9',
              800: '#5b21b6',
              900: '#4c1d95',
            }
          }
        }
      }
    }
  </script>
  <style>
    html { color-scheme: dark; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    .shimmer {
      background: linear-gradient(90deg, #27272a 25%, #3f3f46 50%, #27272a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .method-get    { color: #4ade80; border-color: #16a34a40; background: #16a34a18; }
    .method-post   { color: #fbbf24; border-color: #d9770640; background: #d9770618; }
    .method-delete { color: #f87171; border-color: #dc262640; background: #dc262618; }
    .method-put    { color: #60a5fa; border-color: #2563eb40; background: #2563eb18; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans">
  <div id="root"></div>
  <script type="module" src="/bundle.js"></script>
</body>
</html>
